<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — Drupal-coder</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: rgba(26, 26, 58, 0.95);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 12px;
      padding: 3rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo img {
      height: 50px;
    }

    .auth-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: #999;
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-field {
      margin-bottom: 1.2rem;
    }

    .auth-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    .auth-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid #444;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .auth-field input:focus {
      outline: none;
      border-color: #ff6b6b;
    }

    .auth-status {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      display: none;
      text-align: center;
    }

    .auth-status.error {
      background: rgba(231,76,60,0.2);
      border: 1px solid #e74c3c;
      color: #e74c3c;
      display: block;
    }

    .auth-status.success {
      background: rgba(46,204,113,0.2);
      border: 1px solid #2ecc71;
      color: #2ecc71;
      display: block;
    }

    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s;
      letter-spacing: 0.5px;
    }

    .auth-btn:hover { background: #ff4d4d; }
    .auth-btn:disabled { background: #666; cursor: not-allowed; }

    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
    }

    .auth-links a {
      color: #ff6b6b;
      text-decoration: none;
    }

    .auth-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline class="video-bg">
    <source src="media/video.mp4" type="video/mp4">
  </video>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="media/drupal-coder.svg" alt="Drupal-coder">
      </div>
      <h1 class="auth-title">Вход в личный кабинет</h1>
      <p class="auth-subtitle">Введите логин и пароль, полученные при отправке заявки</p>

      <div id="login-status" class="auth-status"></div>

      <form id="login-form" novalidate>
        <div class="auth-field">
          <label>Логин</label>
          <input type="text" id="login-input" placeholder="Ваш логин" autocomplete="username">
        </div>
        <div class="auth-field">
          <label>Пароль</label>
          <input type="password" id="password-input" placeholder="Ваш пароль" autocomplete="current-password">
        </div>

        <button type="submit" id="login-btn" class="auth-btn">ВОЙТИ</button>
      </form>

      <div class="auth-links">
        <a href="index.html">← Вернуться на главную</a>
      </div>
    </div>
  </div>

  <script>
    const API = '/web_backend/task8/api.cgi';

    const form = document.getElementById('login-form');
    const statusEl = document.getElementById('login-status');
    const btn = document.getElementById('login-btn');

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'auth-status ' + type;
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const login = document.getElementById('login-input').value.trim();
      const password = document.getElementById('password-input').value.trim();

      if (!login || !password) {
        showStatus('Введите логин и пароль', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'ВХОД...';

      try {
        const response = await fetch(API + '?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
        });

        const data = await response.json();

        if (!data.success) {
          showStatus(data.error || 'Неверный логин или пароль', 'error');
          return;
        }

        // Сохраняем токен в localStorage
        localStorage.setItem('jwt_token', data.token);
        localStorage.setItem('user_login', data.login);

        showStatus('Успешный вход! Переход...', 'success');

        setTimeout(() => {
          window.location.href = 'edit.html';
        }, 800);

      } catch (err) {
        showStatus('Ошибка соединения', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ВОЙТИ';
      }
    });
  </script>
</body>
</html>
